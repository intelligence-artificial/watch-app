Object.entries(sprites).forEach(([name, data]) => {
  const div = document.createElement('div'); div.className='mood';
  const h3 = document.createElement('h3'); h3.textContent=name; div.appendChild(h3);
  const c = document.createElement('canvas'); const px=14; c.width=12*px; c.height=12*px;
  c.style.width=(12*px)+'px'; c.style.height=(12*px)+'px';
  const ctx = c.getContext('2d'); ctx.fillStyle='#020206'; ctx.fillRect(0,0,c.width,c.height);
